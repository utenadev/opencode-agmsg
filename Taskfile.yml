version: "3"

tasks:
  default:
    desc: Run all tests (unit + E2E)
    cmds:
      - task: test
      - task: test:e2e

  install:
    desc: Install dependencies
    cmds:
      - bun install

  test:
    desc: Run unit tests
    cmds:
      - bun test

  coverage:
    desc: Run unit tests with coverage report
    cmds:
      - bun test --coverage

  test:watch:
    desc: Run unit tests in watch mode
    cmds:
      - bun test --watch

  build:
    desc: Bundle plugin into single JS file (no node_modules needed at runtime)
    cmds:
      - bun build index.ts --outfile=dist/plugin.js --target=bun

  test:e2e:
    desc: Run end-to-end integration test
    cmds:
      - task: build
      - ./scripts/e2e.sh

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - bun x tsc --noEmit

  semgrep:
    desc: Run semgrep static analysis
    cmds:
      - uv run --with semgrep semgrep scan --config auto

  gitleaks:
    desc: Run gitleaks secret detection
    cmds:
      - gitleaks detect --no-git --verbose

  clean:
    desc: Remove node_modules and lockfile
    cmds:
      - rm -rf node_modules bun.lock

  rebuild:
    desc: Clean install from scratch
    cmds:
      - task: clean
      - task: install
